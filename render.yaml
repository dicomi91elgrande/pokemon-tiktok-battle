# Render Blueprint — despliegue en 1 clic.
# En Render: New + -> Blueprint -> conecta el repo con este archivo.
services:
  - type: web
    name: pokemon-tiktok-battle
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    # Para proteger el webhook, descomenta y pon un valor secreto:
